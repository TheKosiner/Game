name: Reset Daily Limits (Admin)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "reset" to confirm'
        required: true
        default: ''

jobs:
  reset:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'reset' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install firebase-admin
        run: npm install firebase-admin --no-save

      - name: Write service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json

      - name: Run reset script
        run: node reset-daily-limits.mjs /tmp/sa.json

      - name: Cleanup
        if: always()
        run: rm -f /tmp/sa.json
