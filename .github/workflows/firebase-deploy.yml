name: Deploy Firebase

on:
  push:
    branches:
      - main
    paths:
      - 'firestore.rules'
      - 'firebase.json'
      - '.firebaserc'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g firebase-tools

      - name: Deploy Firestore rules
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/sa-key.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json firebase deploy --only firestore:rules --non-interactive
